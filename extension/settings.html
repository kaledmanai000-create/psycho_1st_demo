<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Cognitive Shield TN - Settings</title>
  <link rel="stylesheet" href="popup.css">
  <style>
    .settings-container { padding: 16px; }
    .settings-container h2 { font-size: 1.1rem; margin-bottom: 16px; }
    .form-group { margin-bottom: 14px; }
    .form-group label { display: block; font-size: 0.85rem; margin-bottom: 4px; color: #94a3b8; }
    .form-group input {
      width: 100%;
      padding: 8px 10px;
      background: #0f172a;
      border: 1px solid #334155;
      border-radius: 6px;
      color: #f1f5f9;
      font-size: 0.9rem;
    }
    .form-group input:focus { outline: none; border-color: #6366f1; }
    .settings-actions { display: flex; gap: 8px; margin-top: 16px; }
    .btn-save {
      flex: 1;
      padding: 10px;
      background: #6366f1;
      color: white;
      border: none;
      border-radius: 6px;
      cursor: pointer;
      font-weight: 600;
    }
    .btn-save:hover { background: #818cf8; }
    .btn-back {
      flex: 1;
      padding: 10px;
      background: #334155;
      color: #f1f5f9;
      border: none;
      border-radius: 6px;
      cursor: pointer;
      font-weight: 600;
    }
    .btn-back:hover { background: #475569; }
    .status-msg { margin-top: 10px; text-align: center; font-size: 0.85rem; color: #22c55e; }
  </style>
</head>
<body>
  <div class="container">
    <div class="header">
      <div class="logo">
        <span class="shield-icon">&#9881;</span>
        <h1>Settings</h1>
      </div>
    </div>
    <div class="settings-container">
      <div class="form-group">
        <label for="backend-url">Backend URL</label>
        <input type="text" id="backend-url" placeholder="http://localhost:8000">
      </div>
      <div class="form-group">
        <label for="api-key">API Key</label>
        <input type="text" id="api-key" placeholder="Enter your API key">
      </div>
      <div class="settings-actions">
        <button class="btn-back" id="back-btn">Back</button>
        <button class="btn-save" id="save-btn">Save Settings</button>
      </div>
      <div class="status-msg" id="status-msg"></div>
    </div>
  </div>
  <script src="settings.js"></script>
</body>
</html>
