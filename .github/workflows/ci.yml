name: CI - Cognitive Shield TN

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main]

jobs:
  test:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        working-directory: ./backend
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Lint with flake8
        working-directory: ./backend
        run: |
          flake8 app/ --max-line-length=120 --ignore=E501,W503

      - name: Run tests
        working-directory: ./backend
        run: |
          pytest tests/ -v --tb=short

  docker-build:
    runs-on: ubuntu-latest
    needs: test

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Build backend Docker image
        run: docker build -t cognitive-shield-backend ./backend

      - name: Build dashboard Docker image
        run: docker build -t cognitive-shield-dashboard ./dashboard

      - name: Run tests in Docker
        run: |
          docker run --rm cognitive-shield-backend pytest tests/ -v --tb=short
